name: Generate HTML from YAML

on:
  push:
    branches: [main]
    paths:
      - '**/europe_2026.yaml'
      - '**/generate_itinerary.py'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - run: pip install pyyaml

      - name: Generate HTML
        run: |
          python3 east-europe-2026/generate_itinerary.py \
            east-europe-2026/europe_2026.yaml \
            east-europe-2026/index.html

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add east-europe-2026/index.html
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "auto: regenerate HTML from YAML [skip ci]" && git push
