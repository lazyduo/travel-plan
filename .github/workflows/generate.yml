name: Generate & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'assets/**'
      - '**/europe_2026.yaml'
      - '**/generate_itinerary.py'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - run: pip install pyyaml

      - name: Build site
        run: |
          mkdir -p _site/east-europe-2026
          cp index.html _site/
          cp -r assets _site/
          python3 east-europe-2026/generate_itinerary.py \
            east-europe-2026/europe_2026.yaml \
            _site/east-europe-2026/index.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
